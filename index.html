<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <title>🎵 Blind Test</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --text: #eee;
      --text-muted: #888;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Lock Screen ── */
    #lock-screen {
      text-align: center;
      padding: 2rem;
      animation: fadeIn .5s ease;
    }

    #lock-screen .lock-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    #lock-screen h1 {
      font-size: 1.6rem;
      margin-bottom: .5rem;
    }

    #lock-screen p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-size: .95rem;
    }

    .input-group {
      display: flex;
      gap: .5rem;
      max-width: 360px;
      margin: 0 auto;
    }

    .input-group input {
      flex: 1;
      padding: .75rem 1rem;
      border: 2px solid #333;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
    }

    .input-group button {
      padding: .75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .input-group button:hover {
      background: var(--accent-hover);
    }

    .input-group button:active {
      transform: scale(.97);
    }

    .error-msg {
      color: var(--accent);
      margin-top: .75rem;
      font-size: .85rem;
      min-height: 1.2em;
    }

    /* ── Protected Content ── */
    #protected-content {
      display: none;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: fadeIn .5s ease;
    }

    #protected-content header {
      text-align: center;
      margin-bottom: 2rem;
    }

    #protected-content header h1 {
      font-size: 2rem;
      margin-bottom: .25rem;
    }

    #protected-content header p {
      color: var(--text-muted);
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .track {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .track-header {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .track-title {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .track audio {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      outline: none;
    }

    /* Hide download button in audio controls */
    audio::-webkit-media-controls-enclosure { overflow: hidden; }
    audio::-webkit-media-controls-panel { width: calc(100% + 36px); }
    audio::-internal-media-controls-download-button { display: none !important; }
    audio::-webkit-media-controls-download-button { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      #protected-content { padding: 1.5rem 1rem; }
      #lock-screen h1 { font-size: 1.3rem; }
      .input-group { flex-direction: column; }
      .input-group button { width: 100%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>

    <h1>Accès protégé</h1>
    <p>Entre le mot de passe pour accéder au contenu.</p>
    <form class="input-group" id="password-form">

      <button type="submit">Entrer</button>
    </form>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>
    (function () {
      'use strict';

      // ── Helpers ──
      function base64ToBytes(b64) {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
      }

      async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      }

      async function decrypt(password, payload) {
        const salt = base64ToBytes(payload.salt);
        const iv = base64ToBytes(payload.iv);
        const data = base64ToBytes(payload.data);
        const key = await deriveKey(password, salt);
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          data
        );
        return new TextDecoder().decode(decrypted);
      }

      // ── DOM ──
      const lockScreen = document.getElementById('lock-screen');
      const protectedContent = document.getElementById('protected-content');
      const form = document.getElementById('password-form');
      const input = document.getElementById('password-input');
      const errorMsg = document.getElementById('error-msg');

      const encryptedRaw = document.getElementById('encrypted-data').textContent.trim();
      let encryptedPayload = null;
      try {
        encryptedPayload = JSON.parse(encryptedRaw);
      } catch (e) { /* no payload yet */ }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = input.value.trim();
        if (!password) return;

        errorMsg.textContent = '';

        if (!encryptedPayload) {
          errorMsg.textContent = 'Aucun contenu chiffré trouvé. Lance encrypt.js d\'abord.';
          return;
        }

        try {
          const html = await decrypt(password, encryptedPayload);
          lockScreen.style.display = 'none';
          protectedContent.style.display = 'block';
          protectedContent.innerHTML = html;
          document.body.style.alignItems = 'flex-start';

          // Prevent easy right-click download on audio
          protectedContent.querySelectorAll('audio').forEach(a => {
            a.addEventListener('contextmenu', ev => ev.preventDefault());
          });
        } catch (err) {
          errorMsg.textContent = 'Mot de passe incorrect.';
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 400);
          input.select();
        }
      });

      // Prevent context menu on the whole page
      document.addEventListener('contextmenu', e => e.preventDefault());
    })();
  </script>
